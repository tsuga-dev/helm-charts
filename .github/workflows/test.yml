---
name: Test OpenTelemetry Helm Chart

permissions: {}

on:
  push:
    branches: [main]
    paths:
      - "charts/**"
      - ".ansible-lint"
      - ".editorconfig"
      - ".github/workflows/**"
      - ".pre-commit-config.yaml"
      - ".yamllint.yaml"
  pull_request:
    branches: [main]
    paths:
      - "charts/**"
      - ".ansible-lint"
      - ".editorconfig"
      - ".github/workflows/**"
      - ".pre-commit-config.yaml"
      - ".yamllint.yaml"

env:
  HELM_VERSION: "3.12.0"
  HELM_UNITTEST_VERSION: "v1.0.3"

jobs:
  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install yamllint
        run: |
          python -m pip install yamllint==1.35.1

      - name: Lint YAML files
        run: |
          yamllint -c .yamllint.yaml .

  detect-charts:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Detect changed charts
        id: set-matrix
        run: |
          # Determine base commit for comparison
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="HEAD~1"
          fi

          # Get changed files and extract unique chart names
          CHANGED_FILES=$(git diff --name-only $BASE_SHA HEAD | grep -E '^charts/[^/]+/' || true)

          if [ -z "$CHANGED_FILES" ]; then
            # No chart changes detected, output empty matrix
            echo 'matrix=[]' >> $GITHUB_OUTPUT
          else
            # Extract unique chart names from paths matching charts/<chart-name>/
            CHARTS=$(echo "$CHANGED_FILES" | sed -n 's|^charts/\([^/]*\)/.*|\1|p' | sort -u)

            # Convert to JSON array format for matrix
            MATRIX=$(echo "$CHARTS" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
            echo "Detected changed charts: $CHARTS"
          fi

  lint:
    needs: detect-charts
    if: needs.detect-charts.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chart: ${{ fromJson(needs.detect-charts.outputs.matrix) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Lint Helm chart
        run: |
          helm lint charts/${{ matrix.chart }}

  unittest:
    needs: detect-charts
    if: needs.detect-charts.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chart: ${{ fromJson(needs.detect-charts.outputs.matrix) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Install Helm unittest plugin
        run: |
          if helm plugin install --help | grep -q -- "--verify"; then
            helm plugin install https://github.com/helm-unittest/helm-unittest.git --version "${HELM_UNITTEST_VERSION}" --verify=false
          else
            helm plugin install https://github.com/helm-unittest/helm-unittest.git --version "${HELM_UNITTEST_VERSION}"
          fi

      - name: Run Helm unit tests
        run: |
          helm unittest charts/${{ matrix.chart }}
