---
# Source: opentelemetry-kube-stack/templates/statefulset.yaml
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: test-release-opentelemetry-kube-stack-statefulset
  labels:
    app.kubernetes.io/name: opentelemetry-kube-stack
    app.kubernetes.io/instance: test-release
    app.kubernetes.io/component: statefulset
    app.kubernetes.io/part-of: opentelemetry-kube-stack
    app.kubernetes.io/managed-by: Helm
    opentelemetry.io/target-allocator: test-release-opentelemetry-kube-stack-ta
  annotations:
    meta.helm.sh/release-name: "test-release"
    meta.helm.sh/release-namespace: "default"
spec:
  mode: statefulset
  replicas: 2
  image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-k8s
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  serviceAccount: test-release-opentelemetry-kube-stack
  env:
    - name: TSUGA_OTLP_ENDPOINT
      valueFrom:
        secretKeyRef:
          name: otel-secret
          key: TSUGA_OTLP_ENDPOINT
    - name: MY_POD_IP
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: status.podIP
    - name: TSUGA_API_KEY
      valueFrom:
        secretKeyRef:
          name: otel-secret
          key: TSUGA_API_KEY
    - name: NODE_IP
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: status.hostIP
  config:
    receivers:
      prometheus:
        config:
          scrape_configs: []
    processors:
      batch:
        send_batch_max_size: 5000
        send_batch_size: 5000
      k8sattributes:
        extract:
          annotations:
          - from: pod
            key: resource.opentelemetry.io/service.name
            tag_name: service.name
          - from: pod
            key: resource.opentelemetry.io/service.version
            tag_name: service.version
          - from: pod
            key: resource.opentelemetry.io/env
            tag_name: env
          - from: pod
            key: resource.opentelemetry.io/team
            tag_name: team
          labels:
          - from: pod
            key: resource.opentelemetry.io/service.name
            tag_name: service.name
          - from: pod
            key: resource.opentelemetry.io/service.version
            tag_name: service.version
          - from: pod
            key: resource.opentelemetry.io/env
            tag_name: env
          - from: pod
            key: resource.opentelemetry.io/team
            tag_name: team
          metadata:
          - k8s.namespace.name
          - k8s.deployment.name
          - k8s.statefulset.name
          - k8s.daemonset.name
          - k8s.cronjob.name
          - k8s.job.name
          - k8s.node.name
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.pod.start_time
        passthrough: false
        pod_association:
        - sources:
          - from: resource_attribute
            name: k8s.pod.ip
        - sources:
          - from: resource_attribute
            name: k8s.pod.uid
        - sources:
          - from: connection
    exporters:
      otlphttp/tsuga:
        endpoint: ${TSUGA_OTLP_ENDPOINT}
        headers:
          Authorization: Bearer ${TSUGA_API_KEY}
    service:
      extensions: []
      pipelines:
        metrics:
          exporters:
          - otlphttp/tsuga
          processors:
          - k8sattributes
          - batch
          receivers:
          - prometheus
