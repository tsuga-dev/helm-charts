---
# Source: opentelemetry-kube-stack/templates/daemonset.yaml
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: example-opentelemetry-kube-stack-agent
  labels:
    app.kubernetes.io/name: opentelemetry-kube-stack
    app.kubernetes.io/instance: example
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: opentelemetry-kube-stack
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: "example"
    meta.helm.sh/release-namespace: "default"
spec:
  mode: daemonset
  hostNetwork: true
  image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  volumeMounts:
    - name: hostfs
      mountPath: /hostfs
      readOnly: true
      mountPropagation: HostToContainer
    - name: varlogpods
      mountPath: /var/log/pods
      readOnly: true
    - name: varlibdockercontainers
      mountPath: /var/lib/docker/containers
      readOnly: true
  volumes:
    - name: hostfs
      hostPath:
        path: /
    - name: varlogpods
      hostPath:
        path: /var/log/pods
    - name: varlibdockercontainers
      hostPath:
        path: /var/lib/docker/containers
  serviceAccount: example-opentelemetry-kube-stack
  env:
    
    - name: TSUGA_OTLP_ENDPOINT
      valueFrom:
        secretKeyRef:
          name: otel-secret
          key: TSUGA_OTLP_ENDPOINT
    - name: TSUGA_API_KEY
      valueFrom:
        secretKeyRef:
          name: otel-secret
          key: TSUGA_API_KEY
    - name: MY_POD_IP
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: status.podIP
    - name: NODE_IP
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: status.hostIP
    - name: POD_NAME
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: metadata.name
    - name: POD_UID
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: metadata.uid
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: spec.nodeName
  config:
    receivers:
      file_log:
        exclude:
        - /var/log/pods/*/otc-container/*.log
        - /var/log/pods/*/otel-collector/*.log
        include:
        - /var/log/pods/*/*/*.log
        include_file_name: false
        include_file_path: true
        operators:
        - id: container-parser
          max_log_size: 102400
          type: container
        retry_on_failure:
          enabled: true
        start_at: end
      host_metrics:
        collection_interval: 10s
        root_path: /hostfs
        scrapers:
          cpu:
            metrics:
              system.cpu.utilization:
                enabled: true
          disk: null
          filesystem:
            metrics:
              system.filesystem.utilization:
                enabled: true
          load: null
          memory:
            metrics:
              system.memory.limit:
                enabled: true
              system.memory.utilization:
                enabled: true
          paging:
            metrics:
              system.paging.utilization:
                enabled: true
      kubelet_stats:
        auth_type: serviceAccount
        collection_interval: 20s
        endpoint: ${env:NODE_IP}:10250
        extra_metadata_labels:
        - k8s.volume.type
        insecure_skip_verify: true
        metric_groups:
        - node
        - pod
      otlp:
        protocols:
          grpc:
            endpoint: ${env:MY_POD_IP}:4317
          http:
            endpoint: ${env:MY_POD_IP}:4318
    processors:
      batch:
        send_batch_max_size: 5000
        send_batch_size: 5000
      cumulativetodelta: {}
      k8s_attributes:
        extract:
          annotations:
          - from: pod
            key: resource.opentelemetry.io/service.name
            tag_name: service.name
          - from: pod
            key: resource.opentelemetry.io/service.version
            tag_name: service.version
          - from: pod
            key: resource.opentelemetry.io/env
            tag_name: env
          - from: pod
            key: resource.opentelemetry.io/team
            tag_name: team
          labels:
          - from: pod
            key: resource.opentelemetry.io/service.name
            tag_name: service.name
          - from: pod
            key: resource.opentelemetry.io/service.version
            tag_name: service.version
          - from: pod
            key: resource.opentelemetry.io/env
            tag_name: env
          - from: pod
            key: resource.opentelemetry.io/team
            tag_name: team
          metadata:
          - k8s.namespace.name
          - k8s.deployment.name
          - k8s.statefulset.name
          - k8s.daemonset.name
          - k8s.cronjob.name
          - k8s.job.name
          - k8s.node.name
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.pod.start_time
        filter:
          node_from_env_var: K8S_NODE_NAME
        passthrough: false
        pod_association:
        - sources:
          - from: resource_attribute
            name: k8s.pod.ip
        - sources:
          - from: resource_attribute
            name: k8s.pod.uid
        - sources:
          - from: connection
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25
      resource/collector:
        attributes:
        - action: upsert
          key: service.instance.id
          value: ${POD_UID}
    exporters:
      otlp_http/tsuga:
        compression: gzip
        encoding: json
        endpoint: ${TSUGA_OTLP_ENDPOINT}
        headers:
          Authorization: Bearer ${TSUGA_API_KEY}
    extensions:
      health_check:
        endpoint: ${env:MY_POD_IP}:13133
    connectors:
      span_metrics:
        dimensions:
        - default: GET
          name: http.request.method
        - name: http.response.status_code
        - name: http.route
    service:
      extensions:
      - health_check
      pipelines:
        logs:
          exporters:
          - otlp_http/tsuga
          processors:
          - k8s_attributes
          - memory_limiter
          - batch
          receivers:
          - otlp
          - file_log
        metrics:
          exporters:
          - otlp_http/tsuga
          processors:
          - k8s_attributes
          - memory_limiter
          - cumulativetodelta
          - batch
          receivers:
          - otlp
          - kubelet_stats
          - span_metrics
          - host_metrics
        metrics/extra:
          exporters:
          - otlphttp/tsuga
          processors: []
          receivers:
          - hostmetrics
        traces:
          exporters:
          - otlp_http/tsuga
          - span_metrics
          processors:
          - k8s_attributes
          - memory_limiter
          - batch
          receivers:
          - otlp
      telemetry:
        metrics:
          readers:
          - periodic:
              exporter:
                otlp:
                  endpoint: ${TSUGA_OTLP_ENDPOINT}/v1/metrics
                  headers:
                  - name: Authorization
                    value: Bearer ${TSUGA_API_KEY}
                  protocol: http/protobuf
        resource:
          service.instance.id: ${POD_UID}
