suite: daemonset tests
templates:
  - daemonset.yaml
tests:
  - it: should create daemonset with default values
    set:
      agent.enabled: true
      agent.hostNetwork: true
      serviceAccount.create: true
      serviceAccount.name: ""
      tsuga.otlpEndpoint: "https://test-endpoint.com"
      tsuga.apiKey: "test-api-key"
    release:
      name: "test-release"
    asserts:
      - isKind:
          of: OpenTelemetryCollector
      - equal:
          path: spec.hostNetwork
          value: true
      - equal:
          path: spec.serviceAccount
          value: "test-release-opentelemetry-kube-stack"

  - it: should not include tsuga exporter when enabledForDaemonset is false
    set:
      agent.enabled: true
      tsuga.otlpEndpoint: "https://test-endpoint.com"
      tsuga.apiKey: "test-api-key"
      tsuga.enabledForDaemonset: false
    release:
      name: "test-release"
    asserts:
      - isKind:
          of: OpenTelemetryCollector
      - equal:
          path: spec.config.service.pipelines.logs.exporters
          value: []

  - it: should configure spanmetrics with low-cardinality HTTP dimensions by default
    set:
      agent.enabled: true
      tsuga.otlpEndpoint: "https://test-endpoint.com"
      tsuga.apiKey: "test-api-key"
    release:
      name: "test-release"
    asserts:
      - isKind:
          of: OpenTelemetryCollector
      - equal:
          path: spec.config.connectors.spanmetrics.dimensions[0].name
          value: "http.request.method"
      - equal:
          path: spec.config.connectors.spanmetrics.dimensions[0].default
          value: "GET"
      - equal:
          path: spec.config.connectors.spanmetrics.dimensions[1].name
          value: "http.response.status_code"
      - equal:
          path: spec.config.connectors.spanmetrics.dimensions[2].name
          value: "http.route"
      - notExists:
          path: spec.config.connectors.spanmetrics.calls_dimensions
