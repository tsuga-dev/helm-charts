---
suite: daemonset tests
templates:
  - daemonset.yaml
tests:
  - it: should create daemonset with default values
    set:
      agent.enabled: true
      agent.hostNetwork: true
      serviceAccount.create: true
      serviceAccount.name: ""
      tsuga.otlpEndpoint: "https://intake.<CLUSTER_ID>.tsuga.com:443/api/v1/otlp"
      tsuga.apiKey: "<TSUGA_API_KEY>"
    release:
      name: "test-release"
    asserts:
      - isKind:
          of: OpenTelemetryCollector
      - equal:
          path: spec.hostNetwork
          value: true
      - equal:
          path: spec.serviceAccount
          value: "test-release-opentelemetry-kube-stack"

  - it: should not include tsuga exporter when enabledForDaemonset is false
    set:
      agent.enabled: true
      tsuga.otlpEndpoint: "https://intake.<CLUSTER_ID>.tsuga.com:443/api/v1/otlp"
      tsuga.apiKey: "<TSUGA_API_KEY>"
      tsuga.enabledForDaemonset: false
    release:
      name: "test-release"
    asserts:
      - isKind:
          of: OpenTelemetryCollector
      - equal:
          path: spec.config.service.pipelines.logs.exporters
          value: []

  - it: should configure spanmetrics with low-cardinality HTTP dimensions by default
    set:
      agent.enabled: true
      tsuga.otlpEndpoint: "https://intake.<CLUSTER_ID>.tsuga.com:443/api/v1/otlp"
      tsuga.apiKey: "<TSUGA_API_KEY>"
    release:
      name: "test-release"
    asserts:
      - isKind:
          of: OpenTelemetryCollector
      - equal:
          path: spec.config.connectors.span_metrics.dimensions[0].name
          value: "http.request.method"
      - equal:
          path: spec.config.connectors.span_metrics.dimensions[0].default
          value: "GET"
      - equal:
          path: spec.config.connectors.span_metrics.dimensions[1].name
          value: "http.response.status_code"
      - equal:
          path: spec.config.connectors.span_metrics.dimensions[2].name
          value: "http.route"
      - notExists:
          path: spec.config.connectors.span_metrics.calls_dimensions

  - it: should not reference the Tsuga secret when the exporter is disabled everywhere
    set:
      agent.enabled: true
      tsuga.enabledForClusterReceiver: false
      tsuga.enabledForDaemonset: false
      tsuga.enabledForStatefulset: false
    release:
      name: "test-release"
    asserts:
      - isKind:
          of: OpenTelemetryCollector
      # No secret-backed env is injected, so no secret is required to start.
      - notContains:
          path: spec.env
          content:
            name: TSUGA_API_KEY
            valueFrom:
              secretKeyRef:
                name: otel-secret
                key: TSUGA_API_KEY
      # Non-secret env is still present.
      - contains:
          path: spec.env
          content:
            name: MY_POD_IP
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: status.podIP
      # Internal-telemetry OTLP export (which needs the secret) is skipped.
      - notExists:
          path: spec.config.service.telemetry.metrics
