---
# Agent-only configuration
tsuga:
  otlpEndpoint: "https://intake.<CLUSTER_ID>.tsuga.com:443/api/v1/otlp"
  apiKey: "<TSUGA_API_KEY>"

secret:
  create: true

serviceAccount:
  create: true

rbac:
  create: true

agent:
  enabled: true
  hostNetwork: true
  collectOtelLogs: true
  collectKubernetesLogs: true

cluster:
  enabled: false
