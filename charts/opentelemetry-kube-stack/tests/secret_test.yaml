---
suite: secret tests
templates:
  - secret.yaml
tests:
  - it: should create secret with default values
    set:
      secret.create: true
      secret.name: "otel-secret"
      tsuga.otlpEndpoint: "https://intake.<CLUSTER_ID>.tsuga.com:443/api/v1/otlp"
      tsuga.apiKey: "<TSUGA_API_KEY>"
    release:
      name: "test-release"
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: "otel-secret"
      - equal:
          path: stringData.TSUGA_OTLP_ENDPOINT
          value: "https://intake.<CLUSTER_ID>.tsuga.com:443/api/v1/otlp"
      - equal:
          path: stringData.TSUGA_API_KEY
          value: "<TSUGA_API_KEY>"
