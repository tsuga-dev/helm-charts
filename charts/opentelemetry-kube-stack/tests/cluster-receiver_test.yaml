---
suite: cluster-receiver tests
templates:
  - cluster-receiver.yaml
tests:
  - it: should create deployment with default values
    set:
      cluster.enabled: true
      serviceAccount.create: true
      serviceAccount.name: ""
      tsuga.otlpEndpoint: "https://intake.<CLUSTER_ID>.tsuga.com:443/api/v1/otlp"
      tsuga.apiKey: "<TSUGA_API_KEY>"
    release:
      name: "test-release"
    asserts:
      - isKind:
          of: OpenTelemetryCollector
      - equal:
          path: spec.serviceAccount
          value: "test-release-opentelemetry-kube-stack"

  - it: should not include tsuga exporter when enabledForClusterReceiver is false
    set:
      cluster.enabled: true
      tsuga.otlpEndpoint: "https://intake.<CLUSTER_ID>.tsuga.com:443/api/v1/otlp"
      tsuga.apiKey: "<TSUGA_API_KEY>"
      tsuga.enabledForClusterReceiver: false
    release:
      name: "test-release"
    asserts:
      - isKind:
          of: OpenTelemetryCollector
      - equal:
          path: spec.config.service.pipelines.logs.exporters
          value: []
