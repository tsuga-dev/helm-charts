---
# Source: opentelemetry-database-monitoring/charts/argo-events/templates/argo-events-controller/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-argo-events-controller-manager
  namespace: "default"
  labels:
    helm.sh/chart: argo-events-2.4.22
    app.kubernetes.io/name: argo-events-controller-manager
    app.kubernetes.io/instance: example
    app.kubernetes.io/component: controller-manager
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: argo-events
    app.kubernetes.io/version: "v1.9.10"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: argo-events-controller-manager
      app.kubernetes.io/instance: example
  revisionHistoryLimit: 5
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        checksum/config: e582d4d24cbef623004e1fa804eb237a2c123cfb72fb4fa0424a6d46d28bff50
      labels:
        helm.sh/chart: argo-events-2.4.22
        app.kubernetes.io/name: argo-events-controller-manager
        app.kubernetes.io/instance: example
        app.kubernetes.io/component: controller-manager
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/part-of: argo-events
        app.kubernetes.io/version: "v1.9.10"
    spec:
      containers:
      - name: controller-manager
        image: quay.io/argoproj/argo-events:v1.9.10
        imagePullPolicy: IfNotPresent
        args:
        - controller
        - --leader-election=false
        env:
        - name: ARGO_EVENTS_IMAGE
          value: quay.io/argoproj/argo-events:v1.9.10
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        volumeMounts:
        - name: config
          mountPath: /etc/argo-events
        ports:
        - name: metrics
          containerPort: 7777
          protocol: TCP
        - name: probe
          containerPort: 8081
          protocol: TCP
        livenessProbe:
          httpGet:
            port: probe
            path: /healthz
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 1
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            port: probe
            path: /readyz
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 1
          successThreshold: 1
          failureThreshold: 3
      serviceAccountName: example-argo-events-controller-manager
      volumes:
      - name: config
        configMap:
          name: example-argo-events-controller-manager
