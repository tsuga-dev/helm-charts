---
# Source: opentelemetry-database-monitoring/templates/argo-sensor.yaml
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: example-opentelemetry-database-monitoring-postgresql-setup
  labels:
    helm.sh/chart: opentelemetry-database-monitoring-0.1.1
    app.kubernetes.io/name: opentelemetry-database-monitoring
    app.kubernetes.io/instance: example
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: argo-sensor
    opentelemetry-database-monitoring/database: postgresql
spec:
  eventBusName: default
  template:
    serviceAccountName: example-opentelemetry-database-monitoring-argo-sensor
  dependencies:
    - name: target-pod-created-default
      eventSourceName: example-opentelemetry-database-monitoring-pod-created
      eventName: target-pod-created-default
      filters:
        data:
          - path: body.metadata.annotations.sidecar\.opentelemetry\.io\/inject
            type: string
            value:
              - "postgres-dbm-sidecar"
  triggers:
    - template:
        name: create-postgresql-monitoring-setup-job
        k8s:
          operation: create
          source:
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                generateName: postgresql-postgresql-monitoring-setup-
                namespace: default
                labels:
                  helm.sh/chart: opentelemetry-database-monitoring-0.1.1
                  app.kubernetes.io/name: opentelemetry-database-monitoring
                  app.kubernetes.io/instance: example
                  app.kubernetes.io/version: "1.16.0"
                  app.kubernetes.io/managed-by: Helm
                  app.kubernetes.io/component: db-monitoring-setup
                  opentelemetry-database-monitoring/database: postgresql
              spec:
                backoffLimit: 3
                template:
                  metadata:
                    labels:
                      app.kubernetes.io/name: opentelemetry-database-monitoring
                      app.kubernetes.io/instance: example
                      app.kubernetes.io/component: db-monitoring-setup
                      opentelemetry-database-monitoring/database: postgresql
                  spec:
                    restartPolicy: OnFailure
                    containers:
                      - name: setup
                        image: postgres:17
                        command:
                          - /bin/sh
                          - -c
                          - |
                            until pg_isready -h postgresql -p 5432 -U root; do sleep 2; done
                            PGPASSWORD=otel psql -h postgresql -p 5432 -U root -d otel -f /scripts/monitoring-setup.sql
                            PGPASSWORD=otel psql -h postgresql -p 5432 -U root -d otel -c "ALTER USER otel_monitor WITH PASSWORD '$OTEL_MONITOR_PASSWORD'"
                        env:
                          - name: OTEL_MONITOR_PASSWORD
                            valueFrom:
                              secretKeyRef:
                                name: postgresql-pg-monitor-credentials
                                key: password
                        volumeMounts:
                          - name: monitoring-setup
                            mountPath: /scripts
                    volumes:
                      - name: monitoring-setup
                        configMap:
                          name: postgresql-monitoring-setup
