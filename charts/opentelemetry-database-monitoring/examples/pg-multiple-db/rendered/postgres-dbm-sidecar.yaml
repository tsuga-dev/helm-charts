                unit: "{file}"
                value_column: wal_file_count
                value_type: int
              - data_type: gauge
                metric_name: postgresql.wal.bytes
                unit: By
                value_column: wal_bytes
                value_type: int
            sql: SELECT * FROM otel.pg_wal()
      sqlquery/postgresql_top_queries:
        datasource: host=${env:OTEL_RESOURCE_ATTRIBUTES_POD_NAME} port=5432 dbname=otel user=otel_monitor password=${env:OTEL_MONITOR_PASSWORD} sslmode=disable
        driver: postgres
        queries:
          - metrics:
              - attribute_columns:
                  - db.namespace
                  - db.user.name
                  - server.address
                  - db.version
                  - db.query.text
                data_type: gauge
                metric_name: postgresql.query.calls
                unit: "{query}"
                value_column: calls
                value_type: int
              - attribute_columns:
                  - db.namespace
                  - db.user.name
                  - server.address
                  - db.version
                  - db.query.text
                data_type: gauge
                metric_name: postgresql.query.rows
                unit: "{row}"
                value_column: rows
                value_type: int
              - attribute_columns:
                  - db.namespace
                  - db.user.name
                  - server.address
                  - db.version
                  - db.query.text
                data_type: gauge
                metric_name: postgresql.query.exec_time
                unit: ms
                value_column: total_exec_time
                value_type: double
              - attribute_columns:
                  - db.namespace
                  - db.user.name
                  - server.address
                  - db.version
                  - db.query.text
                data_type: gauge
                metric_name: postgresql.query.plan_time
                unit: ms
                value_column: total_plan_time
                value_type: double
              - attribute_columns:
                  - db.namespace
                  - db.user.name
                  - server.address
                  - db.version
                  - db.query.text
                data_type: gauge
                metric_name: postgresql.query.blocks.shared.hit
                unit: "{block}"
                value_column: shared_blks_hit
                value_type: int
              - attribute_columns:
                  - db.namespace
                  - db.user.name
                  - server.address
                  - db.version
                  - db.query.text
                data_type: gauge
                metric_name: postgresql.query.blocks.shared.read
                unit: "{block}"
                value_column: shared_blks_read
                value_type: int
              - attribute_columns:
                  - db.namespace
                  - db.user.name
                  - server.address
                  - db.version
                  - db.query.text
                data_type: gauge
                metric_name: postgresql.query.blocks.shared.dirtied
                unit: "{block}"
                value_column: shared_blks_dirtied
                value_type: int
              - attribute_columns:
                  - db.namespace
                  - db.user.name
                  - server.address
                  - db.version
                  - db.query.text
                data_type: gauge
                metric_name: postgresql.query.blocks.shared.written
                unit: "{block}"
                value_column: shared_blks_written
                value_type: int
              - attribute_columns:
                  - db.namespace
                  - db.user.name
                  - server.address
                  - db.version
                  - db.query.text
                data_type: gauge
                metric_name: postgresql.query.blocks.temp.read
                unit: "{block}"
                value_column: temp_blks_read
                value_type: int
              - attribute_columns:
                  - db.namespace
                  - db.user.name
                  - server.address
                  - db.version
                  - db.query.text
                data_type: gauge
                metric_name: postgresql.query.blocks.temp.written
                unit: "{block}"
                value_column: temp_blks_written
                value_type: int
            sql: SELECT * FROM otel.pg_top_queries()
    processors:
      batch:
        send_batch_max_size: 5000
        send_batch_size: 5000
    exporters:
      otlp:
        compression: gzip
        endpoint: ${env:K8S_NODE_IP}:4317
        tls:
          insecure: true
    service:
      pipelines:
        metrics:
          exporters:
            - otlp
          processors:
            - batch
          receivers:
            - postgresql
            - sqlquery/postgresql_top_queries
            - sqlquery/pg_table_stats
            - sqlquery/pg_bloat
            - sqlquery/pg_connections
            - sqlquery/pg_locks
            - sqlquery/pg_replication
            - sqlquery/pg_wal
            - sqlquery/pg_vacuum_progress
