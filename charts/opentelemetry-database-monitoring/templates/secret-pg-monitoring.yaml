{{- if .Values.postgres.enabled }}
{{- $root := . }}
{{- range $db := .Values.postgres.databases }}
{{- $secretName := include "opentelemetry-database-monitoring.monitorSecretName" $db }}
{{- $targetNamespace := include "opentelemetry-database-monitoring.databaseNamespace" (merge (dict) $db (dict "Release" $root.Release)) }}
{{- $password := include "opentelemetry-database-monitoring.monitorPassword" (dict "root" $root "db" $db) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $root.Release.Namespace }}
  labels:
    {{- include "opentelemetry-database-monitoring.labels" $root | nindent 4 }}
    opentelemetry-database-monitoring/database: {{ $db.name }}
type: Opaque
data:
  password: {{ $password | b64enc | quote }}
{{- if ne $targetNamespace $root.Release.Namespace }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $targetNamespace }}
  labels:
    {{- include "opentelemetry-database-monitoring.labels" $root | nindent 4 }}
    opentelemetry-database-monitoring/database: {{ $db.name }}
type: Opaque
data:
  password: {{ $password | b64enc | quote }}
{{- end }}
{{- end }}
{{- end }}
