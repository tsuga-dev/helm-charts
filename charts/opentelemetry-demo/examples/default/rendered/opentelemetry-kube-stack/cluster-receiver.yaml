---
# Source: opentelemetry-demo/charts/opentelemetry-kube-stack/templates/cluster-receiver.yaml
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: example-opentelemetry-kube-stack-cluster-receiver
  labels:
    app.kubernetes.io/name: opentelemetry-kube-stack
    app.kubernetes.io/instance: example
    app.kubernetes.io/component: cluster-receiver
    app.kubernetes.io/part-of: opentelemetry-kube-stack
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: "example"
    meta.helm.sh/release-namespace: "default"
spec:
  mode: deployment
  image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  serviceAccount: example-opentelemetry-kube-stack
  env:
    - name: TSUGA_OTLP_ENDPOINT
      valueFrom:
        secretKeyRef:
          name: otel-secret
          key: TSUGA_OTLP_ENDPOINT
    - name: MY_POD_IP
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: status.podIP
    - name: TSUGA_API_KEY
      valueFrom:
        secretKeyRef:
          name: otel-secret
          key: TSUGA_API_KEY
    - name: NODE_IP
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: status.hostIP
    - name: POD_NAME
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: metadata.name
    - name: POD_UID
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: metadata.uid
  config:
    receivers:
      k8s_cluster:
        allocatable_types_to_report:
        - cpu
        - memory
        - storage
        collection_interval: 10s
        metrics:
          k8s.container.status.reason:
            enabled: true
          k8s.container.status.state:
            enabled: true
          k8s.pod.status_reason:
            enabled: true
        node_conditions_to_report:
        - Ready
        - MemoryPressure
        - DiskPressure
        - PIDPressure
      k8sobjects:
        auth_type: serviceAccount
        include_initial_state: true
        objects:
        - group: ""
          mode: watch
          name: pods
        - group: ""
          mode: watch
          name: events
        - group: apps
          mode: watch
          name: deployments
        - group: ""
          mode: watch
          name: nodes
        - group: apps
          mode: watch
          name: replicasets
        - group: apps
          mode: watch
          name: daemonsets
        - group: apps
          mode: watch
          name: statefulsets
      postgresql:
        endpoint: postgresql:5432
        metrics:
          postgresql.bgwriter.buffers.allocated:
            enabled: true
          postgresql.bgwriter.buffers.writes:
            enabled: true
          postgresql.bgwriter.checkpoint.count:
            enabled: true
          postgresql.bgwriter.duration:
            enabled: true
          postgresql.bgwriter.maxwritten:
            enabled: true
          postgresql.blks_hit:
            enabled: true
          postgresql.blks_read:
            enabled: true
          postgresql.connection.max:
            enabled: true
          postgresql.database.locks:
            enabled: true
          postgresql.deadlocks:
            enabled: true
          postgresql.replication.data_delay:
            enabled: true
          postgresql.sequential_scans:
            enabled: true
          postgresql.temp_files:
            enabled: true
          postgresql.tup_deleted:
            enabled: true
          postgresql.tup_fetched:
            enabled: true
          postgresql.tup_inserted:
            enabled: true
          postgresql.tup_returned:
            enabled: true
          postgresql.tup_updated:
            enabled: true
          postgresql.wal.age:
            enabled: true
          postgresql.wal.lag:
            enabled: true
        password: otel
        tls:
          insecure: true
        username: root
      prometheus/self:
        config:
          scrape_configs:
          - job_name: otel-collector
            scrape_interval: 10s
            static_configs:
            - targets:
              - localhost:8888
      sqlquery/pg_bloat:
        collection_interval: 3600s
        datasource: host=postgresql port=5432 dbname=otel user=otel_monitor password=otelmonitor
          sslmode=disable
        driver: postgres
        queries:
        - metrics:
          - attribute_columns:
            - db.schema
            - db.collection.name
            data_type: gauge
            metric_name: postgresql.table.bloat.ratio
            unit: "1"
            value_column: tbloat
            value_type: double
          - attribute_columns:
            - db.schema
            - db.collection.name
            data_type: gauge
            metric_name: postgresql.table.bloat.bytes
            unit: By
            value_column: wastedbytes
            value_type: int
          sql: SELECT * FROM otel.pg_bloat()
      sqlquery/pg_connections:
        collection_interval: 30s
        datasource: host=postgresql port=5432 dbname=otel user=otel_monitor password=otelmonitor
          sslmode=disable
        driver: postgres
        queries:
        - metrics:
          - attribute_columns:
            - db.namespace
            - db.client.connection.state
            data_type: gauge
            metric_name: postgresql.backends
            unit: '{connection}'
            value_column: connection_count
            value_type: int
          - attribute_columns:
            - db.namespace
            - db.client.connection.state
            data_type: gauge
            metric_name: postgresql.backends.age
            unit: s
            value_column: max_state_age_seconds
            value_type: int
          sql: SELECT * FROM otel.pg_connections()
      sqlquery/pg_locks:
        collection_interval: 30s
        datasource: host=postgresql port=5432 dbname=otel user=otel_monitor password=otelmonitor
          sslmode=disable
        driver: postgres
        queries:
        - metrics:
          - attribute_columns:
            - db.postgresql.lock.type
            - db.postgresql.lock.mode
            - db.postgresql.lock.granted
            data_type: gauge
            metric_name: postgresql.lock.count
            unit: '{lock}'
            value_column: lock_count
            value_type: int
          sql: SELECT * FROM otel.pg_lock_counts()
        - metrics:
          - data_type: gauge
            metric_name: postgresql.lock.blocking_queries
            unit: '{query}'
            value_column: blocking_count
            value_type: int
          sql: SELECT * FROM otel.pg_blocking_queries()
        - metrics:
          - attribute_columns:
            - db.namespace
            data_type: gauge
            metric_name: postgresql.connection.idle_in_transaction
            unit: '{connection}'
            value_column: idle_in_transaction_count
            value_type: int
          - attribute_columns:
            - db.namespace
            data_type: gauge
            metric_name: postgresql.connection.idle_in_transaction.age
            unit: s
            value_column: max_idle_tx_age_seconds
            value_type: int
          sql: SELECT * FROM otel.pg_idle_in_transaction()
      sqlquery/pg_replication:
        collection_interval: 30s
        datasource: host=postgresql port=5432 dbname=otel user=otel_monitor password=otelmonitor
          sslmode=disable
        driver: postgres
        queries:
        - metrics:
          - attribute_columns:
            - db.postgresql.replication.slot.name
            - db.postgresql.replication.slot.type
            - db.postgresql.replication.slot.active
            data_type: gauge
            metric_name: postgresql.replication.slot.lag
            unit: By
            value_column: replication_lag_bytes
            value_type: int
          sql: SELECT * FROM otel.pg_replication_slots()
      sqlquery/pg_table_stats:
        collection_interval: 300s
        datasource: host=postgresql port=5432 dbname=otel user=otel_monitor password=otelmonitor
          sslmode=disable
        driver: postgres
        queries:
        - metrics:
          - attribute_columns:
            - db.schema
            - db.collection.name
            data_type: gauge
            metric_name: postgresql.table.vacuum.age
            unit: s
            value_column: seconds_since_last_vacuum
            value_type: int
          - attribute_columns:
            - db.schema
            - db.collection.name
            data_type: gauge
            metric_name: postgresql.table.autovacuum.age
            unit: s
            value_column: seconds_since_last_autovacuum
            value_type: int
          - attribute_columns:
            - db.schema
            - db.collection.name
            data_type: gauge
            metric_name: postgresql.table.analyze.age
            unit: s
            value_column: seconds_since_last_analyze
            value_type: int
          - attribute_columns:
            - db.schema
            - db.collection.name
            data_type: gauge
            metric_name: postgresql.table.autoanalyze.age
            unit: s
            value_column: seconds_since_last_autoanalyze
            value_type: int
          - attribute_columns:
            - db.schema
            - db.collection.name
            data_type: gauge
            metric_name: postgresql.table.autovacuum.count
            unit: '{operation}'
            value_column: autovacuum_count
            value_type: int
          - attribute_columns:
            - db.schema
            - db.collection.name
            data_type: gauge
            metric_name: postgresql.table.analyze.count
            unit: '{operation}'
            value_column: analyze_count
            value_type: int
          - attribute_columns:
            - db.schema
            - db.collection.name
            data_type: gauge
            metric_name: postgresql.table.autoanalyze.count
            unit: '{operation}'
            value_column: autoanalyze_count
            value_type: int
          - attribute_columns:
            - db.schema
            - db.collection.name
            data_type: gauge
            metric_name: postgresql.table.rows.modified.since.analyze
            unit: '{row}'
            value_column: n_mod_since_analyze
            value_type: int
          sql: SELECT * FROM otel.pg_table_stats()
      sqlquery/pg_vacuum_progress:
        collection_interval: 60s
        datasource: host=postgresql port=5432 dbname=otel user=otel_monitor password=otelmonitor
          sslmode=disable
        driver: postgres
        queries:
        - metrics:
          - attribute_columns:
            - db.schema
            - db.collection.name
            - db.postgresql.vacuum.phase
            data_type: gauge
            metric_name: postgresql.vacuum.heap_blks_total
            unit: '{block}'
            value_column: heap_blks_total
            value_type: int
          - attribute_columns:
            - db.schema
            - db.collection.name
            - db.postgresql.vacuum.phase
            data_type: gauge
            metric_name: postgresql.vacuum.heap_blks_scanned
            unit: '{block}'
            value_column: heap_blks_scanned
            value_type: int
          - attribute_columns:
            - db.schema
            - db.collection.name
            - db.postgresql.vacuum.phase
            data_type: gauge
            metric_name: postgresql.vacuum.heap_blks_vacuumed
            unit: '{block}'
            value_column: heap_blks_vacuumed
            value_type: int
          - attribute_columns:
            - db.schema
            - db.collection.name
            data_type: gauge
            metric_name: postgresql.vacuum.age
            unit: s
            value_column: vacuum_age_seconds
            value_type: int
          sql: SELECT * FROM otel.pg_vacuum_progress()
      sqlquery/pg_wal:
        collection_interval: 60s
        datasource: host=postgresql port=5432 dbname=otel user=otel_monitor password=otelmonitor
          sslmode=disable
        driver: postgres
        queries:
        - metrics:
          - data_type: gauge
            metric_name: postgresql.wal.file_count
            unit: '{file}'
            value_column: wal_file_count
            value_type: int
          - data_type: gauge
            metric_name: postgresql.wal.bytes
            unit: By
            value_column: wal_bytes
            value_type: int
          sql: SELECT * FROM otel.pg_wal()
      sqlquery/postgresql_top_queries:
        datasource: host=postgresql port=5432 dbname=otel user=otel_monitor password=otelmonitor
          sslmode=disable
        driver: postgres
        queries:
        - metrics:
          - attribute_columns:
            - db.namespace
            - db.user.name
            - server.address
            - db.version
            - db.query.text
            data_type: gauge
            metric_name: postgresql.query.calls
            unit: '{query}'
            value_column: calls
            value_type: int
          - attribute_columns:
            - db.namespace
            - db.user.name
            - server.address
            - db.version
            - db.query.text
            data_type: gauge
            metric_name: postgresql.query.rows
            unit: '{row}'
            value_column: rows
            value_type: int
          - attribute_columns:
            - db.namespace
            - db.user.name
            - server.address
            - db.version
            - db.query.text
            data_type: gauge
            metric_name: postgresql.query.exec_time
            unit: ms
            value_column: total_exec_time
            value_type: double
          - attribute_columns:
            - db.namespace
            - db.user.name
            - server.address
            - db.version
            - db.query.text
            data_type: gauge
            metric_name: postgresql.query.plan_time
            unit: ms
            value_column: total_plan_time
            value_type: double
          - attribute_columns:
            - db.namespace
            - db.user.name
            - server.address
            - db.version
            - db.query.text
            data_type: gauge
            metric_name: postgresql.query.blocks.shared.hit
            unit: '{block}'
            value_column: shared_blks_hit
            value_type: int
          - attribute_columns:
            - db.namespace
            - db.user.name
            - server.address
            - db.version
            - db.query.text
            data_type: gauge
            metric_name: postgresql.query.blocks.shared.read
            unit: '{block}'
            value_column: shared_blks_read
            value_type: int
          - attribute_columns:
            - db.namespace
            - db.user.name
            - server.address
            - db.version
            - db.query.text
            data_type: gauge
            metric_name: postgresql.query.blocks.shared.dirtied
            unit: '{block}'
            value_column: shared_blks_dirtied
            value_type: int
          - attribute_columns:
            - db.namespace
            - db.user.name
            - server.address
            - db.version
            - db.query.text
            data_type: gauge
            metric_name: postgresql.query.blocks.shared.written
            unit: '{block}'
            value_column: shared_blks_written
            value_type: int
          - attribute_columns:
            - db.namespace
            - db.user.name
            - server.address
            - db.version
            - db.query.text
            data_type: gauge
            metric_name: postgresql.query.blocks.temp.read
            unit: '{block}'
            value_column: temp_blks_read
            value_type: int
          - attribute_columns:
            - db.namespace
            - db.user.name
            - server.address
            - db.version
            - db.query.text
            data_type: gauge
            metric_name: postgresql.query.blocks.temp.written
            unit: '{block}'
            value_column: temp_blks_written
            value_type: int
          sql: SELECT * FROM otel.pg_top_queries()
    processors:
      batch:
        send_batch_max_size: 5000
        send_batch_size: 5000
      cumulativetodelta: {}
      k8sattributes:
        extract:
          annotations:
          - from: pod
            key: resource.opentelemetry.io/service.name
            tag_name: service.name
          - from: pod
            key: resource.opentelemetry.io/service.version
            tag_name: service.version
          - from: pod
            key: resource.opentelemetry.io/env
            tag_name: env
          - from: pod
            key: resource.opentelemetry.io/team
            tag_name: team
          labels:
          - from: pod
            key: resource.opentelemetry.io/service.name
            tag_name: service.name
          - from: pod
            key: resource.opentelemetry.io/service.version
            tag_name: service.version
          - from: pod
            key: resource.opentelemetry.io/env
            tag_name: env
          - from: pod
            key: resource.opentelemetry.io/team
            tag_name: team
          metadata:
          - k8s.namespace.name
          - k8s.deployment.name
          - k8s.statefulset.name
          - k8s.daemonset.name
          - k8s.cronjob.name
          - k8s.job.name
          - k8s.node.name
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.pod.start_time
        passthrough: false
        pod_association:
        - sources:
          - from: resource_attribute
            name: k8s.pod.ip
        - sources:
          - from: resource_attribute
            name: k8s.pod.uid
        - sources:
          - from: connection
      resource/collector:
        attributes:
        - action: upsert
          key: service.instance.id
          value: ${POD_UID}
      resourcedetection:
        detectors:
        - env
        - eks
        override: true
        timeout: 15s
    exporters:
      otlphttp/tsuga:
        compression: gzip
        encoding: json
        endpoint: ${TSUGA_OTLP_ENDPOINT}
        headers:
          Authorization: Bearer ${TSUGA_API_KEY}
    service:
      extensions: []
      pipelines:
        logs:
          exporters:
          - otlphttp/tsuga
          processors:
          - k8sattributes
          - batch
          - resourcedetection
          receivers:
          - k8s_cluster
          - k8sobjects
        metrics:
          exporters:
          - otlphttp/tsuga
          processors:
          - k8sattributes
          - batch
          - resourcedetection
          receivers:
          - k8s_cluster
          - postgresql
          - sqlquery/postgresql_top_queries
          - sqlquery/pg_table_stats
          - sqlquery/pg_bloat
          - sqlquery/pg_connections
          - sqlquery/pg_locks
          - sqlquery/pg_replication
          - sqlquery/pg_wal
          - sqlquery/pg_vacuum_progress
        metrics/collector:
          exporters:
          - otlphttp/tsuga
          processors:
          - cumulativetodelta
          - resource/collector
          - batch
          receivers:
          - prometheus/self
      telemetry:
        metrics:
          readers:
          - periodic:
              exporter:
                otlp:
                  endpoint: ${TSUGA_OTLP_ENDPOINT}/v1/metrics
                  headers:
                    Authorization: Bearer ${TSUGA_API_KEY}
                  protocol: http/protobuf
          - pull:
              exporter:
                prometheus:
                  host: 0.0.0.0
                  port: 8888
                  without_scope_info: false
                  without_type_suffix: false
                  without_units: false
        resource:
          service.instance.id: ${POD_UID}
