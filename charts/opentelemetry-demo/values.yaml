---
dbm:
  enabled: true
  postgres:
    enabled: true
    image: "ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib"
    databases:
      - name: postgresql
        namespace: demo
        sidecar-name: postgres-dbm-sidecar
        user: "root"
        pwd: "otel"
        port: 5432
        host: "postgresql"

opentelemetry-demo:
  enabled: true

  default:
    envOverrides:
      - name: OTEL_COLLECTOR_NAME
        valueFrom:
          fieldRef:
            apiVersion: v1
            fieldPath: status.hostIP

  components:
    accounting:
      podAnnotations:
        resource.opentelemetry.io/team: services
        io.opentelemetry.discovery.logs/enabled: "true"
        io.opentelemetry.discovery.logs/config: |
          include_file_path: true
          operators:
            - type: container
              id: container-parser
    ad:
      podAnnotations:
        resource.opentelemetry.io/team: services
        io.opentelemetry.discovery.logs/enabled: "true"
        io.opentelemetry.discovery.logs/config: |
          include_file_path: true
          operators:
            - type: container
              id: container-parser
    cart:
      podAnnotations:
        resource.opentelemetry.io/team: app
        io.opentelemetry.discovery.logs/enabled: "true"
        io.opentelemetry.discovery.logs/config: |
          include_file_path: true
          operators:
            - type: container
              id: container-parser
    checkout:
      podAnnotations:
        resource.opentelemetry.io/team: app
        io.opentelemetry.discovery.logs/enabled: "true"
        io.opentelemetry.discovery.logs/config: |
          include_file_path: true
          operators:
            - type: container
              id: container-parser
    currency:
      podAnnotations:
        resource.opentelemetry.io/team: services
        io.opentelemetry.discovery.logs/enabled: "true"
        io.opentelemetry.discovery.logs/config: |
          include_file_path: true
          operators:
            - type: container
              id: container-parser
    email:
      podAnnotations:
        resource.opentelemetry.io/team: services
        io.opentelemetry.discovery.logs/enabled: "true"
        io.opentelemetry.discovery.logs/config: |
          include_file_path: true
          operators:
            - type: container
              id: container-parser
    fraud-detection:
      podAnnotations:
        resource.opentelemetry.io/team: services
        io.opentelemetry.discovery.logs/enabled: "true"
        io.opentelemetry.discovery.logs/config: |
          include_file_path: true
          operators:
            - type: container
              id: container-parser
    frontend:
      envOverrides: []
      imageOverride:
        repository: "014498635196.dkr.ecr.eu-central-1.amazonaws.com/tsuga-dev/otel-demo"
        tag: "2.2.0.2-frontend"
      podAnnotations:
        resource.opentelemetry.io/team: app
        resource.opentelemetry.io/service.name: frontend
        io.opentelemetry.discovery.logs/enabled: "true"
        io.opentelemetry.discovery.logs/config: |
          include_file_path: true
          operators:
            - type: container
              id: container-parser

            # Recombine Next.js multi-line errors (stack traces)
            - type: recombine
              id: nextjs-multiline
              combine_field: body
              is_first_entry: body matches "^Error:"
              source_identifier: attributes["log.file.path"]
              force_flush_period: 2s
              max_log_size: 2MiB
              preserve_leading_whitespaces: true
    frontend-proxy:
      podAnnotations:
        resource.opentelemetry.io/team: platform
        io.opentelemetry.discovery.logs/enabled: "true"
        io.opentelemetry.discovery.logs/config: |
          include_file_path: true
          operators:
            - type: container
              id: container-parser
    image-provider:
      podAnnotations:
        resource.opentelemetry.io/team: platform
        resource.opentelemetry.io/service.name: image-provider
        io.opentelemetry.discovery.logs/enabled: "true"
        io.opentelemetry.discovery.logs/config: |
          include_file_path: true
          operators:
            - type: container
              id: container-parser

            # Recombine Envoy/nginx multi-line logs (continuation lines without timestamp)
            - type: recombine
              id: envoy-multiline
              combine_field: body
              is_first_entry: body matches "^\\[\\d{4}-\\d{2}-\\d{2} \\d{2}:\\d{2}:\\d{2}\\.\\d{3}\\]"
              source_identifier: attributes["log.file.path"]
              force_flush_period: 2s
              max_log_size: 2MiB
              preserve_leading_whitespaces: true
        io.opentelemetry.discovery.metrics.8081/enabled: "true"
        io.opentelemetry.discovery.metrics.8081/scraper: nginx
        io.opentelemetry.discovery.metrics.8081/config: |
          endpoint: "http://`endpoint`/status"
          collection_interval: 10s
    load-generator:
      podAnnotations:
        resource.opentelemetry.io/team: platform
        io.opentelemetry.discovery.logs/enabled: "true"
        io.opentelemetry.discovery.logs/config: |
          include_file_path: true
          operators:
            - type: container
              id: container-parser
    payment:
      podAnnotations:
        resource.opentelemetry.io/team: services
        io.opentelemetry.discovery.logs/enabled: "true"
        io.opentelemetry.discovery.logs/config: |
          include_file_path: true
          operators:
            - type: container
              id: container-parser
    product-catalog:
      podAnnotations:
        resource.opentelemetry.io/team: services
        io.opentelemetry.discovery.logs/enabled: "true"
        io.opentelemetry.discovery.logs/config: |
          include_file_path: true
          operators:
            - type: container
              id: container-parser
    product-reviews:
      podAnnotations:
        resource.opentelemetry.io/team: services
        io.opentelemetry.discovery.logs/enabled: "true"
        io.opentelemetry.discovery.logs/config: |
          include_file_path: true
          operators:
            - type: container
              id: container-parser
      imageOverride:
        repository: "014498635196.dkr.ecr.eu-central-1.amazonaws.com/tsuga-dev/otel-demo"
        tag: "2.2.0-product-reviews"
    quote:
      podAnnotations:
        resource.opentelemetry.io/team: services
        io.opentelemetry.discovery.logs/enabled: "true"
        io.opentelemetry.discovery.logs/config: |
          include_file_path: true
          operators:
            - type: container
              id: container-parser
    recommendation:
      podAnnotations:
        resource.opentelemetry.io/team: services
        io.opentelemetry.discovery.logs/enabled: "true"
        io.opentelemetry.discovery.logs/config: |
          include_file_path: true
          operators:
            - type: container
              id: container-parser
    shipping:
      podAnnotations:
        resource.opentelemetry.io/team: services
        io.opentelemetry.discovery.logs/enabled: "true"
        io.opentelemetry.discovery.logs/config: |
          include_file_path: true
          operators:
            - type: container
              id: container-parser
    flagd:
      podAnnotations:
        resource.opentelemetry.io/team: platform
        io.opentelemetry.discovery.logs/enabled: "true"
        io.opentelemetry.discovery.logs/config: |
          include_file_path: true
          operators:
            - type: container
              id: container-parser
    kafka:
      podAnnotations:
        resource.opentelemetry.io/team: platform
        io.opentelemetry.discovery.logs/enabled: "true"
        io.opentelemetry.discovery.logs/config: |
          include_file_path: true
          operators:
            - type: container
              id: container-parser
    postgresql:
      command:
        - docker-entrypoint.sh
        - -c
        - log_destination=stderr
        - -c
        - log_min_duration_statement=0
        - -c
        - log_line_prefix=%m [%p] %u@%d %
        - -c
        - shared_preload_libraries=pg_stat_statements
      mountedConfigMaps:
        - name: "postgresql-init"
          mountPath: "/docker-entrypoint-initdb.d/init.sql"
          subPath: "init.sql"
          existingConfigMap: "postgresql-init"
      podAnnotations:
        resource.opentelemetry.io/team: platform
        resource.opentelemetry.io/service.name: postgresql
        sidecar.opentelemetry.io/inject: "postgres-dbm-sidecar"
        io.opentelemetry.discovery.logs/enabled: "true"
        io.opentelemetry.discovery.logs/config: |
          include_file_path: true
          operators:
            - type: container
              id: container-parser

            # Drop Postgres DETAIL logs
            - type: filter
              id: drop-postgres-detail
              expr: 'body matches "^\\d{4}-\\d{2}-\\d{2} .*\\bDETAIL:"'

            # Recombine Postgres multi-line statements (SQL blocks, wrapped lines, etc.)
            - type: recombine
              id: postgres-multiline
              combine_field: body
              is_first_entry: body matches "^\\d{4}-\\d{2}-\\d{2} "
              source_identifier: attributes["log.file.path"]
              force_flush_period: 2s
              max_log_size: 2MiB
              preserve_leading_whitespaces: true
      additionalVolumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: db-persistent-volume-claim
      additionalVolumeMounts:
        - mountPath: /var/lib/postgres/data
          name: db-data
    valkey-cart:
      podAnnotations:
        resource.opentelemetry.io/team: platform
        resource.opentelemetry.io/service.name: valkey-cart
        io.opentelemetry.discovery.logs/enabled: "true"
        io.opentelemetry.discovery.logs/config: |
          include_file_path: true
          operators:
            - type: container
              id: container-parser

            # Recombine Valkey/Redis multi-line logs (entries start with process:role timestamp pattern)
            - type: recombine
              id: valkey-multiline
              combine_field: body
              is_first_entry: body matches "^\\d+:[A-Z] \\d{2} [A-Z][a-z]{2} \\d{4} \\d{2}:\\d{2}:\\d{2}\\.\\d{3}"
              source_identifier: attributes["log.file.path"]
              force_flush_period: 2s
              max_log_size: 2MiB
              preserve_leading_whitespaces: true
        io.opentelemetry.discovery.metrics.6379/enabled: "true"
        io.opentelemetry.discovery.metrics.6379/scraper: redis
        io.opentelemetry.discovery.metrics.6379/config: |
          collection_interval: 10s
          username: valkey

  opentelemetry-collector:
    enabled: false
  jaeger:
    enabled: false
  opensearch:
    enabled: false
  prometheus:
    enabled: false
  grafana:
    enabled: false

opentelemetry-kube-stack:
  enabled: true
  cluster:
    config:
      extraReceivers:
        k8_sobjects:
          auth_type: serviceAccount
          include_initial_state: true
          objects:
            - group: ""
              name: pods
              mode: watch
            - group: ""
              name: events
              mode: watch
            - group: "apps"
              name: deployments
              mode: watch
            - group: ""
              name: nodes
              mode: watch
            - group: "apps"
              name: replicasets
              mode: watch
            - group: "apps"
              name: daemonsets
              mode: watch
            - group: "apps"
              name: statefulsets
              mode: watch
        k8s_cluster:
          metrics:
            k8s.container.status.state:
              enabled: true
            k8s.pod.status_reason:
              enabled: true
            k8s.container.status.reason:
              enabled: true
      extraProcessors:
        resource_detection:
          detectors: [env, eks]
          timeout: 15s
          override: true
      service:
        pipelines:
          metrics:
            extraProcessors:
              - resource_detection
          logs:
            extraProcessors:
              - resource_detection
            extraReceivers:
              - k8s_objects

  agent:
    image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib
    addLogsVolumes: true
    collectLogs: false
    collectNetwork: true
    config:
      extraExtensions:
        k8s_observer:
          observe_nodes: true
          observe_services: true
          observe_ingresses: true
      extraReceivers:
        receiver_creator/logs:
          watch_observers: [k8s_observer]
          discovery:
            enabled: true
        receiver_creator/metrics:
          watch_observers: [k8s_observer]
          discovery:
            enabled: true
      extraProcessors:
        resource_detection:
          detectors: [env, eks]
          timeout: 15s
          override: true
      service:
        extraExtensions:
          - k8s_observer
        pipelines:
          metrics:
            extraProcessors:
              - resource_detection
            extraReceivers:
              - receiver_creator/metrics
          logs:
            extraProcessors:
              - resource_detection
            extraReceivers:
              - receiver_creator/logs
          traces:
            extraProcessors:
              - resource_detection

# Optional subchart: vanilla spicy-gremlin for synthetic failures in the OTel demo.
# Set enabled=true to run with image defaults (randomized scenarios and built-in OFF baseline).
tsuga-spicy-gremlin:
  enabled: true
  env:
    minIntervalSec: 120
    maxIntervalSec: 600
  image:
    tag: "0.1.3"
  extraEnv:
    - name: OTEL_EXPORTER_OTLP_PROTOCOL
      value: http/protobuf
    - name: OTEL_COLLECTOR_NAME
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: status.hostIP
    - name: OTEL_TRACES_EXPORTER
      value: otlp
    - name: OTEL_METRICS_EXPORTER
      value: otlp
    - name: OTEL_LOGS_EXPORTER
      value: none
    - name: OTEL_SERVICE_NAME
      value: spicy-gremlin
    - name: OTEL_SERVICE_VERSION
      value: "0.1.3"
    - name: POD_NAMESPACE
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: metadata.namespace
    - name: OTEL_RESOURCE_ATTRIBUTES
      value: service.name=$(OTEL_SERVICE_NAME),service.version=$(OTEL_SERVICE_VERSION),service.namespace=$(POD_NAMESPACE)
    - name: OTEL_TRACES_SAMPLER
      value: parentbased_traceidratio
    - name: OTEL_TRACES_SAMPLER_ARG
      value: "1.0"
    - name: OTEL_METRIC_EXPORT_INTERVAL
      value: "60000"
  podAnnotations:
    resource.opentelemetry.io/team: platform
    resource.opentelemetry.io/service.name: spicy-gremlin
    resource.opentelemetry.io/service.version: "0.1.3"
    io.opentelemetry.discovery.logs/enabled: "true"
    io.opentelemetry.discovery.logs/config: |
      include_file_path: true
      operators:
        - type: container
          id: container-parser
