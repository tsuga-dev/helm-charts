---
opentelemetry-demo:
  enabled: true

  default:
    envOverrides:
      - name: OTEL_COLLECTOR_NAME
        valueFrom:
          fieldRef:
            apiVersion: v1
            fieldPath: status.hostIP

  components:
    accounting:
      podAnnotations:
        resource.opentelemetry.io/team: services
    ad:
      podAnnotations:
        resource.opentelemetry.io/team: services
    cart:
      podAnnotations:
        resource.opentelemetry.io/team: app
    checkout:
      podAnnotations:
        resource.opentelemetry.io/team: app
    currency:
      podAnnotations:
        resource.opentelemetry.io/team: services
    email:
      podAnnotations:
        resource.opentelemetry.io/team: services
    fraud-detection:
      podAnnotations:
        resource.opentelemetry.io/team: services
    frontend:
      podAnnotations:
        resource.opentelemetry.io/team: app
        resource.opentelemetry.io/service.name: frontend
        io.opentelemetry.discovery.logs/enabled: "true"
        io.opentelemetry.discovery.logs/config: |
          include_file_path: true
          operators:
            - type: container
              id: container-parser

            # Recombine Next.js multi-line errors (stack traces)
            - type: recombine
              id: nextjs-multiline
              combine_field: body
              is_first_entry: body matches "^Error:"
              source_identifier: attributes["log.file.path"]
              force_flush_period: 2s
              max_log_size: 2MiB
              preserve_leading_whitespaces: true
    frontend-proxy:
      podAnnotations:
        resource.opentelemetry.io/team: platform
    image-provider:
      podAnnotations:
        resource.opentelemetry.io/team: platform
        resource.opentelemetry.io/service.name: image-provider
        io.opentelemetry.discovery.logs/enabled: "true"
        io.opentelemetry.discovery.logs/config: |
          include_file_path: true
          operators:
            - type: container
              id: container-parser

            # Recombine Envoy/nginx multi-line logs (continuation lines without timestamp)
            - type: recombine
              id: envoy-multiline
              combine_field: body
              is_first_entry: body matches "^\\[\\d{4}-\\d{2}-\\d{2} \\d{2}:\\d{2}:\\d{2}\\.\\d{3}\\]"
              source_identifier: attributes["log.file.path"]
              force_flush_period: 2s
              max_log_size: 2MiB
              preserve_leading_whitespaces: true
        io.opentelemetry.discovery.metrics.8081/enabled: "true"
        io.opentelemetry.discovery.metrics.8081/scraper: nginx
        io.opentelemetry.discovery.metrics.8081/config: |
          endpoint: "http://`endpoint`/status"
          collection_interval: 10s
    load-generator:
      podAnnotations:
        resource.opentelemetry.io/team: platform
    payment:
      podAnnotations:
        resource.opentelemetry.io/team: services
    product-catalog:
      podAnnotations:
        resource.opentelemetry.io/team: services
    product-reviews:
      podAnnotations:
        resource.opentelemetry.io/team: services
      imageOverride:
        repository: "014498635196.dkr.ecr.eu-central-1.amazonaws.com/tsuga-dev/otel-demo"
        tag: "2.2.0-product-reviews"
    quote:
      podAnnotations:
        resource.opentelemetry.io/team: services
    recommendation:
      podAnnotations:
        resource.opentelemetry.io/team: services
    shipping:
      podAnnotations:
        resource.opentelemetry.io/team: services
    flagd:
      podAnnotations:
        resource.opentelemetry.io/team: platform
    kafka:
      podAnnotations:
        resource.opentelemetry.io/team: platform
    postgresql:
      command:
        - docker-entrypoint.sh
        - -c
        - log_destination=stderr
        - -c
        - log_min_duration_statement=0
        - -c
        - log_line_prefix=%m [%p] %u@%d %
        - -c
        - shared_preload_libraries=pg_stat_statements
      mountedConfigMaps:
        - name: "postgresql-init"
          mountPath: "/docker-entrypoint-initdb.d/init.sql"
          subPath: "init.sql"
          existingConfigMap: "postgresql-init"
        - name: "monitoring-setup"
          mountPath: "/docker-entrypoint-initdb.d/01-monitoring-setup.sql"
          subPath: "monitoring-setup.sql"
          existingConfigMap: "postgresql-monitoring-setup"
      podAnnotations:
        resource.opentelemetry.io/team: platform
        resource.opentelemetry.io/service.name: postgresql
        io.opentelemetry.discovery.logs/enabled: "true"
        io.opentelemetry.discovery.logs/config: |
          include_file_path: true
          operators:
            - type: container
              id: container-parser

            # Drop Postgres DETAIL logs
            - type: filter
              id: drop-postgres-detail
              expr: 'body matches "^\\d{4}-\\d{2}-\\d{2} .*\\bDETAIL:"'

            # Recombine Postgres multi-line statements (SQL blocks, wrapped lines, etc.)
            - type: recombine
              id: postgres-multiline
              combine_field: body
              is_first_entry: body matches "^\\d{4}-\\d{2}-\\d{2} "
              source_identifier: attributes["log.file.path"]
              force_flush_period: 2s
              max_log_size: 2MiB
              preserve_leading_whitespaces: true
    valkey-cart:
      podAnnotations:
        resource.opentelemetry.io/team: platform
        resource.opentelemetry.io/service.name: valkey-cart
        io.opentelemetry.discovery.logs/enabled: "true"
        io.opentelemetry.discovery.logs/config: |
          include_file_path: true
          operators:
            - type: container
              id: container-parser

            # Recombine Valkey/Redis multi-line logs (entries start with process:role timestamp pattern)
            - type: recombine
              id: valkey-multiline
              combine_field: body
              is_first_entry: body matches "^\\d+:[A-Z] \\d{2} [A-Z][a-z]{2} \\d{4} \\d{2}:\\d{2}:\\d{2}\\.\\d{3}"
              source_identifier: attributes["log.file.path"]
              force_flush_period: 2s
              max_log_size: 2MiB
              preserve_leading_whitespaces: true
        io.opentelemetry.discovery.metrics.6379/enabled: "true"
        io.opentelemetry.discovery.metrics.6379/scraper: redis
        io.opentelemetry.discovery.metrics.6379/config: |
          collection_interval: 10s
          username: valkey

  opentelemetry-collector:
    enabled: false
  jaeger:
    enabled: false
  opensearch:
    enabled: false
  prometheus:
    enabled: false
  grafana:
    enabled: false

opentelemetry-kube-stack:
  enabled: true
  cluster:
    image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib
    config:
      extraReceivers:
        k8sobjects:
          auth_type: serviceAccount
          include_initial_state: true
          objects:
            - group: ""
              name: pods
              mode: watch
            - group: ""
              name: events
              mode: watch
            - group: "apps"
              name: deployments
              mode: watch
            - group: ""
              name: nodes
              mode: watch
            - group: "apps"
              name: replicasets
              mode: watch
            - group: "apps"
              name: daemonsets
              mode: watch
            - group: "apps"
              name: statefulsets
              mode: watch
        k8s_cluster:
          metrics:
            k8s.container.status.state:
              enabled: true
            k8s.pod.status_reason:
              enabled: true
            k8s.container.status.reason:
              enabled: true
        sqlquery/postgresql_top_queries:
          driver: postgres
          datasource: "host=postgresql port=5432 dbname=otel user=otel_monitor password=otelmonitor sslmode=disable"
          queries:
            - sql: SELECT * FROM otel.pg_top_queries()
              metrics:
                - metric_name: postgresql.query.calls
                  value_column: calls
                  attribute_columns:
                    [
                      "db.namespace",
                      "db.user.name",
                      "server.address",
                      "db.version",
                      "db.query.text",
                    ]
                  value_type: int
                  data_type: gauge
                  unit: "{query}"
                - metric_name: postgresql.query.rows
                  value_column: rows
                  attribute_columns:
                    [
                      "db.namespace",
                      "db.user.name",
                      "server.address",
                      "db.version",
                      "db.query.text",
                    ]
                  value_type: int
                  data_type: gauge
                  unit: "{row}"
                - metric_name: postgresql.query.exec_time
                  value_column: total_exec_time
                  attribute_columns:
                    [
                      "db.namespace",
                      "db.user.name",
                      "server.address",
                      "db.version",
                      "db.query.text",
                    ]
                  value_type: double
                  data_type: gauge
                  unit: ms
                - metric_name: postgresql.query.plan_time
                  value_column: total_plan_time
                  attribute_columns:
                    [
                      "db.namespace",
                      "db.user.name",
                      "server.address",
                      "db.version",
                      "db.query.text",
                    ]
                  value_type: double
                  data_type: gauge
                  unit: ms
                - metric_name: postgresql.query.blocks.shared.hit
                  value_column: shared_blks_hit
                  attribute_columns:
                    [
                      "db.namespace",
                      "db.user.name",
                      "server.address",
                      "db.version",
                      "db.query.text",
                    ]
                  value_type: int
                  data_type: gauge
                  unit: "{block}"
                - metric_name: postgresql.query.blocks.shared.read
                  value_column: shared_blks_read
                  attribute_columns:
                    [
                      "db.namespace",
                      "db.user.name",
                      "server.address",
                      "db.version",
                      "db.query.text",
                    ]
                  value_type: int
                  data_type: gauge
                  unit: "{block}"
                - metric_name: postgresql.query.blocks.shared.dirtied
                  value_column: shared_blks_dirtied
                  attribute_columns:
                    [
                      "db.namespace",
                      "db.user.name",
                      "server.address",
                      "db.version",
                      "db.query.text",
                    ]
                  value_type: int
                  data_type: gauge
                  unit: "{block}"
                - metric_name: postgresql.query.blocks.shared.written
                  value_column: shared_blks_written
                  attribute_columns:
                    [
                      "db.namespace",
                      "db.user.name",
                      "server.address",
                      "db.version",
                      "db.query.text",
                    ]
                  value_type: int
                  data_type: gauge
                  unit: "{block}"
                - metric_name: postgresql.query.blocks.temp.read
                  value_column: temp_blks_read
                  attribute_columns:
                    [
                      "db.namespace",
                      "db.user.name",
                      "server.address",
                      "db.version",
                      "db.query.text",
                    ]
                  value_type: int
                  data_type: gauge
                  unit: "{block}"
                - metric_name: postgresql.query.blocks.temp.written
                  value_column: temp_blks_written
                  attribute_columns:
                    [
                      "db.namespace",
                      "db.user.name",
                      "server.address",
                      "db.version",
                      "db.query.text",
                    ]
                  value_type: int
                  data_type: gauge
                  unit: "{block}"
        postgresql:
          endpoint: postgresql:5432
          metrics:
            postgresql.blks_hit:
              enabled: true
            postgresql.blks_read:
              enabled: true
            postgresql.deadlocks:
              enabled: true
            postgresql.tup_deleted:
              enabled: true
            postgresql.tup_fetched:
              enabled: true
            postgresql.tup_inserted:
              enabled: true
            postgresql.tup_returned:
              enabled: true
            postgresql.tup_updated:
              enabled: true
            postgresql.temp_files:
              enabled: true
            postgresql.bgwriter.buffers.allocated:
              enabled: true
            postgresql.bgwriter.buffers.writes:
              enabled: true
            postgresql.bgwriter.checkpoint.count:
              enabled: true
            postgresql.bgwriter.duration:
              enabled: true
            postgresql.bgwriter.maxwritten:
              enabled: true
            postgresql.connection.max:
              enabled: true
            postgresql.database.locks:
              enabled: true
            postgresql.replication.data_delay:
              enabled: true
            postgresql.sequential_scans:
              enabled: true
            postgresql.wal.age:
              enabled: true
            postgresql.wal.lag:
              enabled: true
          password: otel
          tls:
            insecure: true
          username: root
        sqlquery/pg_table_stats:
          driver: postgres
          datasource: "host=postgresql port=5432 dbname=otel user=otel_monitor password=otelmonitor sslmode=disable"
          collection_interval: 300s
          queries:
            - sql: SELECT * FROM otel.pg_table_stats()
              metrics:
                - metric_name: postgresql.table.vacuum.age
                  value_column: seconds_since_last_vacuum
                  unit: s
                  attribute_columns: ["db.schema", "db.collection.name"]
                  data_type: gauge
                  value_type: int
                - metric_name: postgresql.table.autovacuum.age
                  value_column: seconds_since_last_autovacuum
                  unit: s
                  attribute_columns: ["db.schema", "db.collection.name"]
                  data_type: gauge
                  value_type: int
                - metric_name: postgresql.table.analyze.age
                  value_column: seconds_since_last_analyze
                  unit: s
                  attribute_columns: ["db.schema", "db.collection.name"]
                  data_type: gauge
                  value_type: int
                - metric_name: postgresql.table.autoanalyze.age
                  value_column: seconds_since_last_autoanalyze
                  unit: s
                  attribute_columns: ["db.schema", "db.collection.name"]
                  data_type: gauge
                  value_type: int
                - metric_name: postgresql.table.autovacuum.count
                  value_column: autovacuum_count
                  unit: "{operation}"
                  attribute_columns: ["db.schema", "db.collection.name"]
                  data_type: gauge
                  value_type: int
                - metric_name: postgresql.table.analyze.count
                  value_column: analyze_count
                  unit: "{operation}"
                  attribute_columns: ["db.schema", "db.collection.name"]
                  data_type: gauge
                  value_type: int
                - metric_name: postgresql.table.autoanalyze.count
                  value_column: autoanalyze_count
                  unit: "{operation}"
                  attribute_columns: ["db.schema", "db.collection.name"]
                  data_type: gauge
                  value_type: int
                - metric_name: postgresql.table.rows.modified.since.analyze
                  value_column: n_mod_since_analyze
                  unit: "{row}"
                  attribute_columns: ["db.schema", "db.collection.name"]
                  data_type: gauge
                  value_type: int
        sqlquery/pg_bloat:
          driver: postgres
          datasource: "host=postgresql port=5432 dbname=otel user=otel_monitor password=otelmonitor sslmode=disable"
          collection_interval: 3600s
          queries:
            - sql: SELECT * FROM otel.pg_bloat()
              metrics:
                - metric_name: postgresql.table.bloat.ratio
                  value_column: tbloat
                  unit: "1"
                  attribute_columns: ["db.schema", "db.collection.name"]
                  data_type: gauge
                  value_type: double
                - metric_name: postgresql.table.bloat.bytes
                  value_column: wastedbytes
                  unit: By
                  attribute_columns: ["db.schema", "db.collection.name"]
                  data_type: gauge
                  value_type: int
        sqlquery/pg_connections:
          driver: postgres
          datasource: "host=postgresql port=5432 dbname=otel user=otel_monitor password=otelmonitor sslmode=disable"
          collection_interval: 30s
          queries:
            - sql: SELECT * FROM otel.pg_connections()
              metrics:
                - metric_name: postgresql.backends
                  value_column: connection_count
                  unit: "{connection}"
                  attribute_columns:
                    ["db.namespace", "db.client.connection.state"]
                  data_type: gauge
                  value_type: int
                - metric_name: postgresql.backends.age
                  value_column: max_state_age_seconds
                  unit: s
                  attribute_columns:
                    ["db.namespace", "db.client.connection.state"]
                  data_type: gauge
                  value_type: int
        sqlquery/pg_locks:
          driver: postgres
          datasource: "host=postgresql port=5432 dbname=otel user=otel_monitor password=otelmonitor sslmode=disable"
          collection_interval: 30s
          queries:
            - sql: SELECT * FROM otel.pg_lock_counts()
              metrics:
                - metric_name: postgresql.lock.count
                  value_column: lock_count
                  unit: "{lock}"
                  attribute_columns:
                    [
                      "db.postgresql.lock.type",
                      "db.postgresql.lock.mode",
                      "db.postgresql.lock.granted",
                    ]
                  data_type: gauge
                  value_type: int
            - sql: SELECT * FROM otel.pg_blocking_queries()
              metrics:
                - metric_name: postgresql.lock.blocking_queries
                  value_column: blocking_count
                  unit: "{query}"
                  data_type: gauge
                  value_type: int
            - sql: SELECT * FROM otel.pg_idle_in_transaction()
              metrics:
                - metric_name: postgresql.connection.idle_in_transaction
                  value_column: idle_in_transaction_count
                  unit: "{connection}"
                  attribute_columns: ["db.namespace"]
                  data_type: gauge
                  value_type: int
                - metric_name: postgresql.connection.idle_in_transaction.age
                  value_column: max_idle_tx_age_seconds
                  unit: s
                  attribute_columns: ["db.namespace"]
                  data_type: gauge
                  value_type: int
        sqlquery/pg_replication:
          driver: postgres
          datasource: "host=postgresql port=5432 dbname=otel user=otel_monitor password=otelmonitor sslmode=disable"
          collection_interval: 30s
          queries:
            - sql: SELECT * FROM otel.pg_replication_slots()
              metrics:
                - metric_name: postgresql.replication.slot.lag
                  value_column: replication_lag_bytes
                  unit: By
                  attribute_columns:
                    [
                      "db.postgresql.replication.slot.name",
                      "db.postgresql.replication.slot.type",
                      "db.postgresql.replication.slot.active",
                    ]
                  data_type: gauge
                  value_type: int
        sqlquery/pg_wal:
          driver: postgres
          datasource: "host=postgresql port=5432 dbname=otel user=otel_monitor password=otelmonitor sslmode=disable"
          collection_interval: 60s
          queries:
            - sql: SELECT * FROM otel.pg_wal()
              metrics:
                - metric_name: postgresql.wal.file_count
                  value_column: wal_file_count
                  unit: "{file}"
                  data_type: gauge
                  value_type: int
                - metric_name: postgresql.wal.bytes
                  value_column: wal_bytes
                  unit: By
                  data_type: gauge
                  value_type: int
        sqlquery/pg_vacuum_progress:
          driver: postgres
          datasource: "host=postgresql port=5432 dbname=otel user=otel_monitor password=otelmonitor sslmode=disable"
          collection_interval: 60s
          queries:
            - sql: SELECT * FROM otel.pg_vacuum_progress()
              metrics:
                - metric_name: postgresql.vacuum.heap_blks_total
                  value_column: heap_blks_total
                  unit: "{block}"
                  attribute_columns:
                    [
                      "db.schema",
                      "db.collection.name",
                      "db.postgresql.vacuum.phase",
                    ]
                  data_type: gauge
                  value_type: int
                - metric_name: postgresql.vacuum.heap_blks_scanned
                  value_column: heap_blks_scanned
                  unit: "{block}"
                  attribute_columns:
                    [
                      "db.schema",
                      "db.collection.name",
                      "db.postgresql.vacuum.phase",
                    ]
                  data_type: gauge
                  value_type: int
                - metric_name: postgresql.vacuum.heap_blks_vacuumed
                  value_column: heap_blks_vacuumed
                  unit: "{block}"
                  attribute_columns:
                    [
                      "db.schema",
                      "db.collection.name",
                      "db.postgresql.vacuum.phase",
                    ]
                  data_type: gauge
                  value_type: int
                - metric_name: postgresql.vacuum.age
                  value_column: vacuum_age_seconds
                  unit: s
                  attribute_columns: ["db.schema", "db.collection.name"]
                  data_type: gauge
                  value_type: int
      extraProcessors:
        resourcedetection:
          detectors: [env, eks]
          timeout: 15s
          override: true
      service:
        pipelines:
          metrics:
            extraProcessors:
              - resourcedetection
            extraReceivers:
              - postgresql
              - sqlquery/postgresql_top_queries
              - sqlquery/pg_table_stats
              - sqlquery/pg_bloat
              - sqlquery/pg_connections
              - sqlquery/pg_locks
              - sqlquery/pg_replication
              - sqlquery/pg_wal
              - sqlquery/pg_vacuum_progress
          logs:
            extraProcessors:
              - resourcedetection
            extraReceivers:
              - k8sobjects

  agent:
    image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib
    addLogsVolumes: true
    collectLogs: false
    collectNetwork: true
    config:
      extraExtensions:
        k8s_observer:
          observe_nodes: true
          observe_services: true
          observe_ingresses: true
      extraReceivers:
        receiver_creator/logs:
          watch_observers: [k8s_observer]
          discovery:
            enabled: true
        receiver_creator/metrics:
          watch_observers: [k8s_observer]
          discovery:
            enabled: true
      extraProcessors:
        resourcedetection:
          detectors: [env, eks]
          timeout: 15s
          override: true
      service:
        extraExtensions:
          - k8s_observer
        pipelines:
          metrics:
            extraProcessors:
              - resourcedetection
            extraReceivers:
              - receiver_creator/metrics
          logs:
            extraProcessors:
              - resourcedetection
            extraReceivers:
              - receiver_creator/logs
          traces:
            extraProcessors:
              - resourcedetection

# Optional subchart: vanilla spicy-gremlin for synthetic failures in the OTel demo.
# Set enabled=true to run with image defaults (randomized scenarios and built-in OFF baseline).
tsuga-spicy-gremlin:
  enabled: true
  env:
    minIntervalSec: 120
    maxIntervalSec: 600
  image:
    tag: "0.1.3"
  extraEnv:
    - name: OTEL_EXPORTER_OTLP_PROTOCOL
      value: http/protobuf
    - name: OTEL_COLLECTOR_NAME
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: status.hostIP
    - name: OTEL_TRACES_EXPORTER
      value: otlp
    - name: OTEL_METRICS_EXPORTER
      value: otlp
    - name: OTEL_LOGS_EXPORTER
      value: none
    - name: OTEL_SERVICE_NAME
      value: spicy-gremlin
    - name: OTEL_SERVICE_VERSION
      value: "0.1.3"
    - name: POD_NAMESPACE
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: metadata.namespace
    - name: OTEL_RESOURCE_ATTRIBUTES
      value: service.name=$(OTEL_SERVICE_NAME),service.version=$(OTEL_SERVICE_VERSION),service.namespace=$(POD_NAMESPACE)
    - name: OTEL_TRACES_SAMPLER
      value: parentbased_traceidratio
    - name: OTEL_TRACES_SAMPLER_ARG
      value: "1.0"
    - name: OTEL_METRIC_EXPORT_INTERVAL
      value: "60000"
  podAnnotations:
    resource.opentelemetry.io/team: platform
    resource.opentelemetry.io/service.name: spicy-gremlin
    resource.opentelemetry.io/service.version: "0.1.3"
    io.opentelemetry.discovery.logs/enabled: "true"
    io.opentelemetry.discovery.logs/config: |
      include_file_path: true
      operators:
        - type: container
          id: container-parser
